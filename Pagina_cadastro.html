<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styleJoao.css">
</head>

<header class="header-cadastro">
</header>

<body class="body-cadastro">

    <img src="img/fundo_login.jpeg" class="fundo">
    
    <a href="Pagina_Login.html">
        <img class="voltar" src="img/Arrow_left.svg">
    </a>
   
    <img src="img/LogoMãospng.png" class="logo_cadastro">

    <div class="container_cadastro">

        <form class="formulario">

            
            <h1>Cadastro</h1>

            <center>
            <h2>Informações pessoais</h2><br>
            </center>

            <div class="linha">
                <div class="campo">
                    <label for="nome"><strong>Nome: </strong></label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                </div>

                <div class="campo">
                    <label for="cpf"><strong>CPF: </strong></label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label for="email"><strong>Email:</strong> </label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email">
                </div>

                <div class="campo">
                    <label for="telefone"><strong>Telefone:</strong> </label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Digite seu nome">
                </div>
            </div>

            <label for="deficiencia"><strong>Deficiencia:</strong></label>
            <input type="text" id="deficiencia" name="deficiencia" placeholder="Digite sua deficiência"><br><br><br>
            
            <center>
                <div class="button">
                    <button type="button" onclick="salvarPagina1()">
                    Continuar
                    </button>
                </div>
            </center>

            <script>
                /*Define função botão*/
                function salvarPagina1(){

                    /*Captura os dados do formulario na variavel dados*/
                    const dados = {
                        nome: document.getElementById("nome").value,
                        cpf: document.getElementById("cpf").value,
                        email: document.getElementById("email").value,
                        telefone: document.getElementById("telefone").value,
                        deficiencia: document.getElementById("deficiencia").value
                    };

                    /*Armazena no local do navegador como dados cadastro transformando em texto*/
                    localStorage.setItem(
                        "dadosCadastro",
                        JSON.stringify(dados)
                    );

                    /*Leva a proxima página*/
                    window.location.href = "Pagina_cadastro2.html";
                }
            </script>

            </div>
        </div>
    
</form>
</body>
</html>
