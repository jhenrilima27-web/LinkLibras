<!DOCTYPE html>

    <link rel="stylesheet" href="styleJoao.css">
</head>

<header class="header-cadastro">
</header>

<body class="body-cadastro">
    
    <a href="Pagina_Login.html">
        <img class="voltar" src="img/Arrow_left.svg">
    </a>

    <a href="Pagina_principal.html">
        <img class="casa_inicial" src="img/Home.svg">
    </a>
   
    <img src="img/LogoMãospng.png" class="logo_branca1">

    <div class="container_cadastro">

        <form class="formulario" method="post" action="salvar.php">

            
            <h1>Cadastro</h1><br>

            <h3>Informações pessoais</h3><br>

            <div class="linha">
                <div class="campo">
                    <label for="Nome"><strong>Nome: </strong></label>
                    <input type="text" id="nome" name="Nome"><br>
                </div>

                <div class="campo">
                    <label for="CPF"><strong>CPF: </strong></label>
                    <input type="text" id="CPF" name="CPF"><br>
                </div>
            </div>

            <div class="linha">
                <div>
                    <label for="Email"><strong>Email:</strong> </label>
                    <input type="email" id="Email" name="Email"><br>
                </div>

                <div class="campo">
                    <label for="Telefone"><strong>Telefone:</strong> </label>
                    <input type="tel" id="Telefone" name="Telefone"><br>
                </div>
            </div>

            <label for="Deficiencia"><strong>Deficiencia:</strong></label>
            <input type="text" id="Deficiencia" name="Deficiencia"><br><br>


            <h3>Endereço</h3><br>

            <div class="linha">
                <div class="campo">
                    <label for="CEP"><strong>CEP: </strong></label>
                    <input type="number" id="CEP" name="CEP"><br>
                </div>

                <div class="campo">
                    <label for="Estado"><strong>Estado: </strong></label>
                    <input type="text" id="Estado" name="Estado"><br>
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label for="Cidade"><strong>Cidade:</strong></label>
                    <input type="text" id="Cidade" name="Cidade"><br>
                </div>

                <div class="campo">
                    <label for="Bairro"><strong>Bairro:</strong></label>
                    <input type="text" id="Bairro" name="Bairro"><br>
                </div>
            </div>

            <div>
                <label for="Complemento"><strong>Complemento:</strong></label>
                <input type="text" id="Complemento" name="Complemento">
            </div><br>

            <h3>Definir senha</h3><br>

            <div class="linha">
                <div class="campo">
                    <label for="Senha"><strong>Senha:</strong></label>
                    <input type="password" id="Senha" name="Senha"><br><br>
                </div>

            
                <div class="campo">
                    <label for="Senha2"><strong>Confirmar Senha:</strong> </label>
                    <input type="password" id="Senha2" name="Senha2"><br><br>
                </div>
            </div>
                
            <div class="button">
            <button class="button1" type="submit">Concluir</button>
            </div>

            </div>
        </div>
    
</body>
