<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styleJoao.css">
</head>

<header class="header-cadastro">
</header>

<body class="body-cadastro">

    <img src="img/fundo_login.jpeg" class="fundo">
    
    <a href="Pagina_cadastro2.html">
        <img class="voltar" src="img/Arrow_left.svg">
    </a>
   
    <img src="img/LogoMãospng.png" class="logo_cadastro3">

    <div class="container_cadastro">

        <form class="formulario">

            <h1>Cadastro</h1>

            <center>
                <h2>Definir senha</h2><br>
            </center>

            <div>
                <div class="campo">
                    <label class="label_senha" for="senha"><strong>Senha:</strong></label>
                    <center>
                        <input class="input_senha" type="password" id="senha" name="senha" placeholder="Digite sua senha"><br><br>
                    </center>
                </div>

                <div class="campo">
                    <label class="label_senha" for="senha2"><strong>Confirmar Senha:</strong></label>
                    <center>
                        <input class="input_senha" type="password" id="senha2" name="senha2" placeholder="Confirme sua senha"><br><br>
                    </center>
                </div>

                </div>
                    
                <center>
                    <button
                        class="button1"
                        type="button"
                        onclick="concluirCadastro()">
                        Concluir
                    </button>
                </center>

        </form>
    </div>

    <script>
    // define a função
    async function concluirCadastro(){

        // Define a variavel senha
        const senha =
            document.getElementById("senha").value;

        // Define a variavel senha2
        const senha2 =
            document.getElementById("senha2").value;

        // compara as senhas 
        if(senha !== senha2){

            alert("As senhas não coincidem.");

            return;
        }

        //trás os dados da outra página
        let dados =
            JSON.parse(
                localStorage.getItem("dadosCadastro")
            );

        //Adiciona a senha aos dados
        dados.senha = senha;


        try {

    const resposta = await fetch(
        "https://linklibras.infinityfree.me/clientes_cadastrar.php",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            // envia os dados
            body: JSON.stringify(dados)
        }
    );

    const resultado = await resposta.json();

    //Mensagem de certo ou errado
    if(resultado.sucesso){

        alert(resultado.mensagem);

        localStorage.removeItem("dadosCadastro");

        window.location.href = "Pagina_Login.html";

    } else {

        alert("Erro: " + resultado.mensagem);

    }

    } catch(erro){

    console.error(erro);

    alert("Erro ao conectar com o servidor.");

    }

    }

    </script>
</body>
</html>
