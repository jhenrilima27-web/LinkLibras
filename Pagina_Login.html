        <div class="botoes">
            <a href="Pagina_cadastro.html">
                <button type="button">Se Cadastrar</button>
            </a>
            
            <a href="Pagina_principal.html">
                <button type="button">Entrar</button>
            </a>
        </div>
        </form>
    </div>
