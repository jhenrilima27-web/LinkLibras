<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar os Interpretes</title>
    <link rel="stylesheet" href="styleJoao.css">
</head>
<body class="body_interpretes">

    <img src="img/fundo_login.jpeg" class="fundo">

    <a href="Pagina_principal.html">
        <img class="voltar" src="img/Arrow_left.svg">
    </a>
    
    <img src="img/LogoMãospng.png" class="logo_interprete">

    <div class="container_cadastro_interpretes">

        <h1>Cadastro de Intérpretes</h1><br>

        <form id="formInterprete">

            <div class="linha">
                <!-- NOME -->
                <div class="campo">

                    <label for="nome">
                        <strong> Nome do Intérprete: </strong>
                    </label>

                    <input type="text" id="nome" name="nome"
                        required
                        minlength="3"
                        maxlength="200"
                        placeholder="Digite o nome do Interprete">

                </div>

                <!-- Estado -->
                <div class="campo">
                    <label for="estado">
                        <strong> Estado:</strong>
                    </label>

                    <input type="text" id="estado" name="estado"
                        required
                        minlength="3"
                        maxlength="100"
                        placeholder="Digite seu Estado">
                </div>
            </div>


            <div class="linha">
                <!-- PREÇO -->
                <div class="campo">

                    <label for="preco">
                        <strong>Preço por hora: </strong>
                    </label>

                    <input type="number"
                        id="preco"
                        name="preco"
                        required
                        min="0"
                        step="0.01"
                        placeholder="Ex:150">

                </div>

                <!-- Cidade -->
                <div class="campo">
                        <label for="cidade">
                            <strong>Cidade:</strong>
                        </label>

                        <input type="text" id="cidade" name="cidade"
                            required
                            minlength="3"
                            maxlength="100"
                            placeholder="Digite Sua Cidade">
                    </div>
                </div>
            
            <div class="linha">
                <!-- IMAGEM -->
                <div class="campo">

                    <label for="imagem">
                        <strong>Foto do intérprete:</strong>
                    </label>

                    <input type="url" id="imagem" name="imagem" value ="https://picsum.photos/300/200?random=1"
                        required
                        placeholder="https://picsum.photos/300/200?random=1">

                </div>

                <!-- Descrição -->
                <div class="campo">
                        <label for="descricao">
                            <strong>Descrição:</strong>
                        </label>

                        <input type="text" id="descricao" name="descricao"
                            required
                            minlength="3"
                            maxlength="100"
                            placeholder="Ex: Trabalho a 5 anos como intérprete...">
                    </div>
            </div>

            <!-- BOTÃO -->
            <center>
            <button type="submit">
                Cadastrar Intérprete
            </button>
            </center>

        </form>

    </div>

<script>
	
document.getElementById("formInterprete").addEventListener("submit", cadastrarInterprete);


async function cadastrarInterprete(evento) {

    // EVITA RECARREGAR A PÁGINA
    evento.preventDefault();

const form = document.getElementById("formInterprete"); // CAPTURA O FORMULÁRIO
const dadosForm = new FormData(form); // CAPTURA TODOS OS CAMPOS
const interprete = Object.fromEntries( dadosForm.entries()  ); // CONVERTE PARA OBJETO
console.log(interprete); // EXIBE OBJETO'

    try {
        // ENVIA PARA API PHP
        const resposta = await fetch("interpretes_cadastrar.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(interprete)
        });

		debugger;
	
        // CONVERTE RESPOSTA
        const dados = await resposta.json();

        // EXIBE RETORNO
        alert(dados.mensagem);

    } catch(erro) {

        console.error(erro);

        alert("Erro ao cadastrar Interprete");
    }
}

</script>
</body>
</html>
