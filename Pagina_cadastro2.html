<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styleJoao.css">
</head>

<header class="header-cadastro">
</header>

<body class="body-cadastro">

    <img src="img/fundo_login.jpeg" class="fundo">
    
    <a href="Pagina_cadastro.html">
        <img class="voltar" src="img/Arrow_left.svg">
    </a>
   
    <img src="img/LogoMãospng.png" class="logo_cadastro">

    <div class="container_cadastro">

        <form class="formulario">

            
            <h1>Cadastro</h1>

            <center>
                <h2>Endereço</h2><br>
            </center>

            <div class="linha">
                <div class="campo">
                    <label for="cep"><strong>CEP: </strong></label>
                    <input type="number" id="cep" name="cep" placeholder="Digite seu CEP">
                </div>

                <div class="campo">
                    <label for="estado"><strong>Estado: </strong></label>
                    <input type="text" id="estado" name="estado" placeholder="Digite seu Estado">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label for="cidade"><strong>Cidade:</strong></label>
                    <input type="text" id="cidade" name="cidade" placeholder="Digite sua Cidade">
                </div>

                <div class="campo">
                    <label for="bairro"><strong>Bairro:</strong></label>
                    <input type="text" id="bairro" name="bairro" placeholder="Digite seu bairro">
                </div>
            </div>

            <div>
                <label for="complemento"><strong>Complemento:</strong></label>
                <input type="text" id="complemento" name="complemento" placeholder="Digite o Complemento">
            </div><br><br>

            <center>    
                <button type="button" onclick="salvarPagina2()">
                    Continuar
                </button>
            </center>

            </div>
        </div>

        <script>
            /*Definindo função do botão*/
            function salvarPagina2(){

                /*Pegando os dados da página passada e transformando em objeto de novo*/
                let dados =
                    JSON.parse(
                        localStorage.getItem("dadosCadastro")
                    );

                /*Adicionando novos dados a variavel dados*/
                dados.cep = document.getElementById("cep").value;

                dados.estado = document.getElementById("estado").value;

                dados.cidade = document.getElementById("cidade").value;

                dados.bairro = document.getElementById("bairro").value;

                dados.complemento = document.getElementById("complemento").value;

                /*Guardando de novo para a nova página e transformando em texto*/
                localStorage.setItem(
                    "dadosCadastro",
                    JSON.stringify(dados)
                );

                /*Direciona para a página 3*/
                window.location.href = "Pagina_cadastro3.html";
            }
        </script>
</body>
</form>
</html>
